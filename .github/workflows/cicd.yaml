name: Release Plugin (Build with Bigdata.com)

on:
  push:
    tags: ["v[0-9]+.[0-9]+.*"]

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Build and release in one step so the zip path is guaranteed to exist when gh runs.
      # gh release create treats asset paths as globs — missing files yield "no matches found".
      - name: Build plugin package and create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y zip
          chmod +x ./scripts/build-plugin.sh
          ./scripts/build-plugin.sh "${TAG_NAME}"
          ZIP="${GITHUB_WORKSPACE}/dist/claude-plugin-build-with-bigdata-com_${TAG_NAME}.zip"
          test -f "${ZIP}"
          ls -la "${GITHUB_WORKSPACE}/dist/"
          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "Release ${TAG_NAME}" \
            --generate-notes \
            "${ZIP}"
