name: Release Plugin (Build with Bigdata.com)

on:
  push:
    tags: ["v[0-9]+.[0-9]+.*"]

# Opt into Node 24 for all JavaScript actions (checkout, etc.).
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # Redundant with workflow env — some runners only read job-level env for JS actions.
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      # Pin major version; use fetch-depth 0 so `gh release create --generate-notes` has git history.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build plugin package and create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y zip
          chmod +x ./scripts/build-plugin.sh
          ./scripts/build-plugin.sh "${TAG_NAME}"
          ZIP="${GITHUB_WORKSPACE}/dist/claude-plugin-build-with-bigdata-com_${TAG_NAME}.zip"
          test -f "${ZIP}"
          ls -la "${GITHUB_WORKSPACE}/dist/"

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists; uploading zip (clobber)."
            gh release upload "${TAG_NAME}" "${ZIP}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Release ${TAG_NAME}" \
              --generate-notes \
              "${ZIP}"
          fi
